version: "3.8"

# Docker Swarm stack — deploy com:
#   cd /opt/topagenda && docker-compose build && docker stack deploy -c docker-stack.yml topagenda
#
# Traefik: rede=shared-net, entrypoints=web/websecure, certresolver=letsencryptresolver

services:
  # Bot principal (agentes + agendador)
  instagram-bot:
    image: topagenda-bot:latest
    env_file:
      - .env
    volumes:
      - topagenda_output:/app/output
    networks:
      - topagenda-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s

  # Dashboard 3D (React + Flask API) — exposto via Traefik em insta.conectplay.top
  dashboard:
    image: topagenda-dashboard:latest
    env_file:
      - .env
    volumes:
      - topagenda_output:/app/output
    networks:
      - topagenda-net
      - shared-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=shared-net"
        - "traefik.http.routers.topagenda.rule=Host(`insta.conectplay.top`)"
        - "traefik.http.routers.topagenda.entrypoints=websecure"
        - "traefik.http.routers.topagenda.tls=true"
        - "traefik.http.routers.topagenda.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.topagenda.loadbalancer.server.port=5000"

  # Servidor de imagens para o Instagram Graph API (porta 8080 direta)
  file-server:
    image: nginx:alpine
    volumes:
      - topagenda_output:/usr/share/nginx/html:ro
    networks:
      - topagenda-net
    ports:
      - target: 80
        published: 8080
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  topagenda_output:
    driver: local

networks:
  topagenda-net:
    driver: overlay
    attachable: true
  shared-net:
    external: true
    name: shared-net
